name: CI - HTML/CSS/JS (Vite)

on:
  push:
    branches: [main]
    paths:
      - 'template-html-css-js/**'
      - '.github/workflows/ci-html-css-js.yml'
  pull_request:
    branches: [main]
    paths:
      - 'template-html-css-js/**'
      - '.github/workflows/ci-html-css-js.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: template-html-css-js

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
