name: CI - Java CLI (Maven)

on:
  push:
    branches: [main]
    paths:
      - 'java-maven-cli/**'
      - '.github/workflows/ci-java-maven-cli.yml'
  pull_request:
    branches: [main]
    paths:
      - 'java-maven-cli/**'
      - '.github/workflows/ci-java-maven-cli.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-maven-cli

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package
