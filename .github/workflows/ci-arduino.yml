name: CI - Arduino

on:
  push:
    branches: [main]
    paths:
      - 'template-arduino/**'
      - '.github/workflows/ci-arduino.yml'
  pull_request:
    branches: [main]
    paths:
      - 'template-arduino/**'
      - '.github/workflows/ci-arduino.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: template-arduino

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: pio run
