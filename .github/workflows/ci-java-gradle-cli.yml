name: CI - Java CLI (Gradle)

on:
  push:
    branches: [main]
    paths:
      - 'java-gradle-cli/**'
      - '.github/workflows/ci-java-gradle-cli.yml'
  pull_request:
    branches: [main]
    paths:
      - 'java-gradle-cli/**'
      - '.github/workflows/ci-java-gradle-cli.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-gradle-cli

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build with Gradle
        run: gradle build -x artifactoryPublish --no-daemon
